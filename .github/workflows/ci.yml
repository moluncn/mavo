name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build MaVo
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun swift --version

      - name: Run tests
        run: scripts/run_tests.sh

      - name: Build and verify app archive
        run: scripts/build_app.sh

      - name: Confirm build output stays untracked
        run: |
          test -f outputs/MaVo-*-arm64.zip
          test -z "$(git status --short --untracked-files=all)"
